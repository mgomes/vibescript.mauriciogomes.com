{{define "examples"}}
<div class="catalog fade-in">
  <aside class="catalog-sidebar" data-catalog-sidebar>
    <div class="catalog-sidebar-header">
      <span class="eyebrow">Examples</span>
      <h2>Browse examples</h2>
      <p>{{.TotalExamples}} examples. {{.RunnableExamples}} runnable.</p>
    </div>
    <nav class="catalog-nav" data-catalog-nav></nav>
  </aside>

  <div class="catalog-main">
    <div class="catalog-toolbar" data-catalog-toolbar>
      <div class="catalog-active-filters" data-active-filters></div>
    </div>
    <div class="card-grid" data-catalog-grid>
      {{range .Examples}}
      <a href="/examples/{{.Slug}}" class="example-card" data-category="{{.Category}}" data-tags="{{range .Tags}}{{.}} {{end}}">
        <h3>{{.Title}}</h3>
        <p>{{.Summary}}</p>
        <span class="card-category">{{.Category}}</span>
      </a>
      {{end}}
    </div>
  </div>
</div>
{{end}}
